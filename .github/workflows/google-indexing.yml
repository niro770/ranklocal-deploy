name: Google Indexing

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs via IndexNow
        run: |
          echo 'Submitting 25 URLs to IndexNow...'
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host": "ranklocall.com", "key": "a5a0b3891600a163f735e3fb81c872be", "keyLocation": "https://ranklocall.com/a5a0b3891600a163f735e3fb81c872be.txt", "urlList": ["https://ranklocall.com/", "https://ranklocall.com/local-seo/", "https://ranklocall.com/google-maps-ranking/", "https://ranklocall.com/google-business-profile/", "https://ranklocall.com/pay-per-call-marketplace/", "https://ranklocall.com/pay-per-call/", "https://ranklocall.com/tools/", "https://ranklocall.com/blog/", "https://ranklocall.com/blog/best-pay-per-call-networks/", "https://ranklocall.com/blog/best-local-seo-companies/", "https://ranklocall.com/blog/what-is-pay-per-call-advertising/", "https://ranklocall.com/blog/pay-per-call-vs-pay-per-lead/", "https://ranklocall.com/blog/how-does-pay-per-call-work/", "https://ranklocall.com/blog/pay-per-call-vs-google-ads/", "https://ranklocall.com/blog/pay-per-call-roi-tips/", "https://ranklocall.com/blog/best-industries-for-pay-per-call/", "https://ranklocall.com/ranklocall-vs-servicedirect/", "https://ranklocall.com/apply/", "https://ranklocall.com/tools/roi-calculator/", "https://ranklocall.com/tools/call-value-calculator/", "https://ranklocall.com/tools/local-seo-audit/", "https://ranklocall.com/tools/market-domination-planner/", "https://ranklocall.com/tools/geo-grid-scanner/", "https://ranklocall.com/tools/map-pack-anatomy/", "https://ranklocall.com/tools/rank-simulator/"]}')
          echo "IndexNow response: $STATUS"
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host": "ranklocall.com", "key": "a5a0b3891600a163f735e3fb81c872be", "keyLocation": "https://ranklocall.com/a5a0b3891600a163f735e3fb81c872be.txt", "urlList": ["https://ranklocall.com/", "https://ranklocall.com/local-seo/", "https://ranklocall.com/google-maps-ranking/", "https://ranklocall.com/google-business-profile/", "https://ranklocall.com/pay-per-call-marketplace/", "https://ranklocall.com/pay-per-call/", "https://ranklocall.com/tools/", "https://ranklocall.com/blog/", "https://ranklocall.com/blog/best-pay-per-call-networks/", "https://ranklocall.com/blog/best-local-seo-companies/", "https://ranklocall.com/blog/what-is-pay-per-call-advertising/", "https://ranklocall.com/blog/pay-per-call-vs-pay-per-lead/", "https://ranklocall.com/blog/how-does-pay-per-call-work/", "https://ranklocall.com/blog/pay-per-call-vs-google-ads/", "https://ranklocall.com/blog/pay-per-call-roi-tips/", "https://ranklocall.com/blog/best-industries-for-pay-per-call/", "https://ranklocall.com/ranklocall-vs-servicedirect/", "https://ranklocall.com/apply/", "https://ranklocall.com/tools/roi-calculator/", "https://ranklocall.com/tools/call-value-calculator/", "https://ranklocall.com/tools/local-seo-audit/", "https://ranklocall.com/tools/market-domination-planner/", "https://ranklocall.com/tools/geo-grid-scanner/", "https://ranklocall.com/tools/map-pack-anatomy/", "https://ranklocall.com/tools/rank-simulator/"]}')
          echo "Bing response: $STATUS2"
          echo "Done — 25 URLs submitted"
