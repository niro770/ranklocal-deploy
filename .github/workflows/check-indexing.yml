name: Check Indexing Status

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  check-indexing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check indexing via Search Console API
        run: |
          pip install requests --quiet
          python3 check_indexing.py
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

      - name: Commit status file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indexing-status.json
          git diff --staged --quiet || git commit -m "chore: update indexing status [skip ci]"
          git push
